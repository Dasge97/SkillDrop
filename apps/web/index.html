<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/mascot/login.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>SkillDrop — Aprende diseño de producto con maestría</title>
    <script>
      // Aplica el tema antes del primer paint para evitar parpadeo.
      (function () {
        try {
          var t = localStorage.getItem('skilldrop-theme') || 'system';
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = t === 'dark' || (t === 'system' && sysDark);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="font-sans bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
