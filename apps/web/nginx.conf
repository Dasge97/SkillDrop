server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache de assets estáticos.
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  # SPA: cualquier ruta cae en index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
