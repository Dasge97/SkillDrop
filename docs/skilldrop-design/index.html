<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillDrop — Prototipo</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            brand: {
              50:  'hsl(174 70% 96%)',
              100: 'hsl(174 70% 90%)',
              200: 'hsl(174 66% 80%)',
              300: 'hsl(174 60% 66%)',
              400: 'hsl(174 62% 50%)',
              500: 'hsl(174 68% 41%)',
              600: 'hsl(174 72% 34%)',
              700: 'hsl(174 74% 28%)',
              800: 'hsl(174 74% 22%)',
              900: 'hsl(174 70% 16%)',
              950: 'hsl(174 72% 10%)',
            },
          },
          boxShadow: {
            soft: '0 1px 2px rgba(15,23,42,0.04), 0 4px 16px rgba(15,23,42,0.06)',
            'soft-lg': '0 2px 4px rgba(15,23,42,0.04), 0 12px 32px rgba(15,23,42,0.10)',
          },
        },
      },
    };
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    /* tasteful scrollbar */
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,.35); border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,.55); border: 3px solid transparent; background-clip: content-box; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(148,163,184,.25); background-clip: content-box; }
    [data-active-nav] { scroll-margin-top: 80px; }
  </style>
  <script>
    // Apply theme before paint to avoid flash
    (function () {
      try {
        var t = localStorage.getItem('skilldrop-theme') || 'system';
        var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = t === 'dark' || (t === 'system' && sysDark);
        document.documentElement.classList.toggle('dark', dark);
      } catch (e) {}
    })();
  </script>
</head>
<body class="font-sans bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div id="root"></div>

  <!-- Infra -->
  <script type="text/babel" src="js/icons.jsx"></script>
  <script type="text/babel" src="js/ui.jsx"></script>
  <script type="text/babel" src="js/mock.jsx"></script>

  <!-- Screens (one component per file) -->
  <script type="text/babel" src="js/Landing.jsx"></script>
  <script type="text/babel" src="js/Login.jsx"></script>
  <script type="text/babel" src="js/Register.jsx"></script>
  <script type="text/babel" src="js/AppShell.jsx"></script>
  <script type="text/babel" src="js/Dashboard.jsx"></script>
  <script type="text/babel" src="js/Roadmap.jsx"></script>
  <script type="text/babel" src="js/PhaseView.jsx"></script>
  <script type="text/babel" src="js/LessonView.jsx"></script>
  <script type="text/babel" src="js/ChallengeView.jsx"></script>
  <script type="text/babel" src="js/SubmitView.jsx"></script>
  <script type="text/babel" src="js/SubmissionView.jsx"></script>
  <script type="text/babel" src="js/ProgressView.jsx"></script>
  <script type="text/babel" src="js/ResourcesView.jsx"></script>
  <script type="text/babel" src="js/MentorQueue.jsx"></script>
  <script type="text/babel" src="js/MentorReview.jsx"></script>
  <script type="text/babel" src="js/Admin.jsx"></script>

  <!-- Router + bootstrap (last) -->
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
