# SkillDrop — despliegue con Docker (single-origin)
#
# Arquitectura: un único servicio público (web/nginx) que sirve el frontend y
# hace de reverse-proxy de /api -> servicio interno `api`. Pensado para CodeHive
# (Traefik apunta a skilldrop.code-hive.space -> web:80). Ver spec.md (bloque
# Deployment) y README_DEPLOY.md.
#
# Local:  docker compose up --build  ->  http://localhost:8080
# Cuentas demo: student|mentor|admin @skilldrop.dev / skilldrop

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: "file:/data/dev.db"
      API_PORT: "4000"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      JWT_EXPIRES_IN: "7d"
      # Mismo origen detrás del proxy; configurable para el dominio público.
      WEB_ORIGIN: "${WEB_ORIGIN:-https://skilldrop.code-hive.space}"
      NODE_ENV: "production"
    volumes:
      - skilldrop-data:/data
    # Sin `ports`: la API NO se publica al host, solo es accesible por la red
    # interna de Docker (la alcanza `web` vía http://api:4000).
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Ruta relativa: el frontend llama a /api (lo resuelve nginx).
        VITE_API_URL: "${VITE_API_URL:-/api}"
    # Único servicio público. Se publica solo en loopback; Traefik (CodeHive)
    # enruta el dominio hacia este puerto.
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  skilldrop-data:
